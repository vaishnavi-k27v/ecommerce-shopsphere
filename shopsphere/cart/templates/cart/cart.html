<!DOCTYPE html>
<html>
<head>
<title>My Cart</title>

<body>

<h1>Your Cart</h1>

<p>Price: ₹{{ item.product.price }}</p>

<hr>

{% endfor %}

<a href="/orders/create/">Place Order</a>

</body>
</html>
